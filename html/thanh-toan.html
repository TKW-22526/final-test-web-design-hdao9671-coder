<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Thanh toán | Flower Shop</title>

    <link rel="stylesheet" href="../css/trangindex.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <div class="logo">

            <img src="../assets/img/logo-shop-hoa-3.jpg">

            <h2>Flower Shop</h2>

        </div>

        <nav>

            <ul>

                <li><a href="../index.html">Trang chủ</a></li>

                <li><a href="san-pham.html">Sản phẩm</a></li>

                <li><a href="gioi-thieu.html">Giới thiệu</a></li>

                <li><a href="lien-he.html">Liên hệ</a></li>

            </ul>

        </nav>

        <div class="header-right">

            <a href="gio-hang.html">

                <i class="fa-solid fa-cart-shopping"></i>

                Giỏ hàng

            </a>

        </div>

    </header>



    <!-- ================= THANH TOÁN ================= -->

    <section class="thanh-toan">

        <h2>Thanh toán đơn hàng</h2>

        <div class="thanh-toan-box">

<!-- Danh sách sản phẩm -->

<div class="san-pham-mua">

    <div id="sanPhamThanhToan"></div>

    <div class="tong-thanh-toan">

        <h3>
            Tổng tiền:
            <span id="tongTien">0 VNĐ</span>
        </h3>

    </div>

</div>

            <!-- Thông tin -->

            <div class="form-thanh-toan">

                <h3>Thông tin khách hàng</h3>

                <input
                    type="text"
                    id="hoTen"
                    placeholder="Họ và tên">

                <input
                    type="tel"
                    id="sdt"
                    placeholder="Số điện thoại">

                <input
                    type="text"
                    id="diaChi"
                    placeholder="Địa chỉ nhận hàng">

                <textarea
                    id="ghiChu"
                    placeholder="Ghi chú"
                    rows="4"></textarea>

                <h4>Phương thức thanh toán</h4>

                <label>

                    <input type="radio"
                        name="tt"
                        checked>

                    Thanh toán khi nhận hàng

                </label>

                <label>

                    <input type="radio"
                        name="tt">

                    Chuyển khoản

                </label>

                <label>

                    <input type="radio"
                        name="tt">

                    Ví điện tử

                </label>

                <button onclick="datHang()">

                    <i class="fa-solid fa-circle-check"></i>

                    Xác nhận đặt hàng

                </button>

            </div>

        </div>

    </section>



    <!-- ================= FOOTER ================= -->

    <footer>

        <div>

            <h3>Flower Shop</h3>

            <p>Chuyên cung cấp hoa tươi chất lượng cao.</p>

        </div>

        <div>

            <p>

                <i class="fa-solid fa-location-dot"></i>

                Trà Vinh

            </p>

            <p>

                <i class="fa-solid fa-phone"></i>

                0123 456 789

            </p>

            <p>

                <i class="fa-solid fa-envelope"></i>

                flowershop@gmail.com

            </p>

        </div>

    </footer>



    <script src="../js/data.js"></script>

    <script src="../js/thanh-toan.js"></script>

</body>

</html>
