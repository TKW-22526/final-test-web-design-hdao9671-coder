<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chi tiết sản phẩm | Flower Shop</title>


    <!-- CSS -->

    <link rel="stylesheet" href="../css/trangindex.css">


    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>


<body>


    <!-- CHI TIẾT SẢN PHẨM -->

    <section class="chi-tiet">


        <!-- Hình ảnh -->

        <div class="anh-hoa">

            <img id="anhSP" 
                 alt="Hình ảnh sản phẩm">

        </div>



        <!-- Thông tin -->

        <div class="thong-tin">


            <h1 id="tenSP"></h1>


            <h3 id="danhMuc"></h3>


            <div id="giaSP"></div>


         <p id="moTa"></p>
<div class="so-luong-mua">

    <span>Số lượng:</span>

    <button type="button" onclick="giamSoLuong()">-</button>

    <input
        type="number"
        id="soLuong"
        value="1"
        min="1"
        readonly>

    <button type="button" onclick="tangSoLuong()">+</button>

</div>
<div class="nut-chi-tiet">

    <button class="btn-gio" onclick="themGioHang()">

        <i class="fa-solid fa-cart-shopping"></i>

        Thêm vào giỏ hàng

    </button>

    <button class="btn-mua" onclick="muaNgay()">

        <i class="fa-solid fa-bag-shopping"></i>

        Mua ngay

    </button>

</div>
<!-- Nút quay lại -->

<a href="san-pham.html" class="btn-quay-lai">

    <i class="fa-solid fa-arrow-left"></i>

    Quay về sản phẩm

</a>
    </section>





    <!-- JAVASCRIPT -->

    <script src="../js/data.js"></script>

    <script src="../js/chi-tiet.js"></script>


</body>

</html>
